<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 150" role="img" aria-label="Ink & Steel">
  <defs>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a2c33"/>
      <stop offset="0.5" stop-color="#14130f"/>
      <stop offset="1" stop-color="#3a3f49"/>
    </linearGradient>
  </defs>
  <!-- nib body: a blade that is also a pen -->
  <path fill="url(#steel)" d="M50 8
    C72 8 88 22 88 42
    L55 124 C53 130 47 130 45 124
    L12 42 C12 22 28 8 50 8 Z"/>
  <!-- breather hole -->
  <circle cx="50" cy="48" r="8.5" fill="#f7f3ea"/>
  <!-- slit -->
  <path d="M50 56 L50 120" stroke="#f7f3ea" stroke-width="3" stroke-linecap="round"/>
  <!-- ink drop at the point -->
  <path fill="#8c2b27" d="M50 130
    c6 8 9 12 9 17 a9 9 0 0 1-18 0 c0-5 3-9 9-17 Z"/>
</svg>
