<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a2c33"/>
      <stop offset="0.5" stop-color="#14130f"/>
      <stop offset="1" stop-color="#3a3f49"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#f7f3ea"/>

  <!-- ink wash accents -->
  <path d="M980 40 C1120 20 1200 120 1160 240 C1130 330 1010 360 940 300 C880 248 880 120 980 40 Z" fill="#8c2b27" opacity="0.10"/>
  <path d="M60 470 C150 430 270 470 280 560 C286 620 220 660 150 640 C80 620 20 520 60 470 Z" fill="#45505f" opacity="0.10"/>
  <circle cx="1090" cy="120" r="10" fill="#8c2b27" opacity="0.5"/>
  <circle cx="140" cy="430" r="7" fill="#45505f" opacity="0.5"/>

  <!-- inner frame -->
  <rect x="48" y="48" width="1104" height="534" fill="none" stroke="#e4dac3" stroke-width="2"/>

  <!-- nib mark -->
  <g transform="translate(110,150) scale(1.5)">
    <path fill="url(#steel)" d="M50 8 C72 8 88 22 88 42 L55 124 C53 130 47 130 45 124 L12 42 C12 22 28 8 50 8 Z"/>
    <circle cx="50" cy="48" r="8.5" fill="#f7f3ea"/>
    <path d="M50 56 L50 120" stroke="#f7f3ea" stroke-width="3" stroke-linecap="round"/>
    <path fill="#8c2b27" d="M50 130 c6 8 9 12 9 17 a9 9 0 0 1-18 0 c0-5 3-9 9-17 Z"/>
  </g>

  <!-- wordmark -->
  <text x="290" y="250" font-family="Georgia, 'Times New Roman', serif" font-size="118" font-weight="600" fill="#14130f" letter-spacing="-2">Ink <tspan fill="#8c2b27" font-style="italic">&amp;</tspan> Steel</text>

  <!-- brush rule -->
  <path d="M292 300 C 420 295, 560 305, 700 299 C 820 294, 900 304, 980 300" fill="none" stroke="#14130f" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
  <path d="M635 290 L645 300 L635 310 L625 300 Z" fill="#8c2b27"/>

  <!-- tagline -->
  <text x="292" y="372" font-family="Georgia, 'Times New Roman', serif" font-size="34" fill="#423d33">From the Desk of Sanity</text>
  <text x="292" y="424" font-family="Georgia, 'Times New Roman', serif" font-size="27" fill="#6f6856">Decoding the Politics of the United States</text>

  <!-- footer url -->
  <text x="292" y="520" font-family="Georgia, serif" font-size="24" letter-spacing="2" fill="#8c2b27">INKSTEELJOURNAL.COM</text>
</svg>
